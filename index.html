<!-- JAVASCRIPT TO HANDLE THE CLICKING -->
<script>
    function showPage(pageId) {
        // 1. Get all elements with the class 'page-section'
        const sections = document.querySelectorAll('.page-section');
        
        // 2. Loop through them and hide them all
        sections.forEach(section => {
            section.style.display = 'none';
        });

        // 3. Show the specific section that matches the ID clicked
        const activeSection = document.getElementById(pageId);
        if (activeSection) {
            // If it's the home page, we keep the flex display for the hero image
            if(pageId === 'home') {
                activeSection.style.display = 'flex';
            } else {
                activeSection.style.display = 'block';
            }
        }
    }
</script>
